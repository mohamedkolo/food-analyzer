<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد الكتاب — NutraX</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Navbar ── */
  .navbar {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .navbar-brand { color: #4ade80; font-size: 1.4rem; font-weight: 700; text-decoration: none; }
  .navbar a.back { color: #94a3b8; font-size: 0.9rem; text-decoration: none; }
  .navbar a.back:hover { color: #fff; }

  /* ── Layout ── */
  .container {
    max-width: 900px;
    margin: 32px auto;
    padding: 0 16px;
  }

  .page-title {
    text-align: center;
    margin-bottom: 28px;
  }
  .page-title h1 { font-size: 1.6rem; color: #1a1a2e; }
  .page-title p  { color: #64748b; margin-top: 6px; font-size: 0.95rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: #fff;
    padding: 8px;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
    background: transparent;
    color: #64748b;
  }
  .tab-btn.active { background: #4ade80; color: #1a1a2e; }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  /* ── Search ── */
  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .search-box input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .search-box input:focus { border-color: #4ade80; }
  .btn-primary {
    padding: 12px 22px;
    background: #4ade80;
    color: #1a1a2e;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
    transition: opacity 0.2s;
  }
  .btn-primary:hover   { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Search Results ── */
  .result-card {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .result-card:hover { border-color: #4ade80; background: #f0fff4; }
  .result-page {
    font-size: 0.8rem;
    font-weight: 700;
    color: #4ade80;
    background: #f0fff4;
    border: 1px solid #4ade80;
    border-radius: 6px;
    padding: 2px 8px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .result-snippet { font-size: 0.9rem; color: #475569; line-height: 1.7; }

  /* ── AI Chat ── */
  .chat-area {
    height: 380px;
    overflow-y: auto;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.7; }
  .msg.user {
    background: #1a1a2e;
    color: #fff;
    align-self: flex-start;
    border-radius: 12px 12px 12px 2px;
  }
  .msg.ai {
    background: #f0fff4;
    border: 1px solid #bbf7d0;
    color: #1a1a2e;
    align-self: flex-end;
    border-radius: 12px 12px 2px 12px;
  }
  .msg.ai .pages-ref {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #bbf7d0;
    font-size: 0.8rem;
    color: #16a34a;
    font-weight: 600;
  }
  .msg.loading { color: #94a3b8; font-style: italic; }

  .welcome-msg {
    text-align: center;
    color: #94a3b8;
    margin: auto;
    font-size: 0.95rem;
  }
  .welcome-msg .icon { font-size: 2.5rem; margin-bottom: 8px; }

  .input-row {
    display: flex;
    gap: 10px;
  }
  .input-row textarea {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    resize: none;
    height: 50px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .input-row textarea:focus { border-color: #4ade80; }

  /* ── Empty / Loading states ── */
  .empty-state { text-align: center; color: #94a3b8; padding: 32px 0; }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid #ccc;
    border-top-color: #4ade80;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .msg { max-width: 95%; }
    .page-title h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard">🥗 NutraX</a>
  <a class="back" href="/dashboard">← لوحة التحكم</a>
</nav>

<div class="container">
  <div class="page-title">
    <h1>📚 مساعد كتاب الغذاء والتغذية</h1>
    <p>ابحث في الكتاب أو اسأل الذكاء الاصطناعي — والإجابة مع رقم الصفحة</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search')">🔍 بحث في الكتاب</button>
    <button class="tab-btn"       onclick="switchTab('ai')">🤖 اسأل الـ AI</button>
  </div>

  <!-- ── TAB: Search ── -->
  <div id="tab-search" class="card">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="مثال: بروتين كلى، فيتامين د، رضاعة طبيعية..." 
             onkeydown="if(event.key==='Enter') doSearch()">
      <button class="btn-primary" onclick="doSearch()" id="searchBtn">بحث</button>
    </div>
    <div id="searchResults">
      <div class="empty-state">🔍 اكتب كلمة وابحث في الـ 596 صفحة</div>
    </div>
  </div>

  <!-- ── TAB: AI ── -->
  <div id="tab-ai" class="card" style="display:none;">
    <div class="chat-area" id="chatArea">
      <div class="welcome-msg">
        <div class="icon">🤖</div>
        <div>اسألني أي سؤال تغذية<br>وهرد عليك من الكتاب مع رقم الصفحة</div>
      </div>
    </div>
    <div class="input-row">
      <textarea id="questionInput" placeholder="مثال: ما هي كمية البروتين المناسبة لمريض الكلى؟"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askAI();}"></textarea>
      <button class="btn-primary" onclick="askAI()" id="askBtn">إرسال</button>
    </div>
  </div>
</div>

<script>
// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-search').style.display = tab === 'search' ? 'block' : 'none';
  document.getElementById('tab-ai').style.display     = tab === 'ai'     ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'search' && i === 0) || (tab === 'ai' && i === 1));
  });
}

// ── Search ─────────────────────────────────────────────────────────────────
async function doSearch() {
  const q   = document.getElementById('searchInput').value.trim();
  const btn = document.getElementById('searchBtn');
  const box = document.getElementById('searchResults');
  if (!q) return;

  btn.disabled  = true;
  btn.innerHTML = 'جاري البحث <span class="spinner"></span>';
  box.innerHTML = '';

  try {
    const res  = await fetch(`/api/book/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      box.innerHTML = '<div class="empty-state">لم أجد نتائج — جرب كلمة أخرى</div>';
      return;
    }

    box.innerHTML = data.results.map(r => `
      <div class="result-card">
        <span class="result-page">صفحة ${r.page}</span>
        <p class="result-snippet">${r.snippet.replace(/\n/g, ' ')}</p>
      </div>
    `).join('');
  } catch(e) {
    box.innerHTML = '<div class="empty-state">حدث خطأ، حاول مرة أخرى</div>';
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'بحث';
  }
}

// ── AI Chat ────────────────────────────────────────────────────────────────
let chatEmpty = true;

async function askAI() {
  const input = document.getElementById('questionInput');
  const btn   = document.getElementById('askBtn');
  const chat  = document.getElementById('chatArea');
  const q     = input.value.trim();
  if (!q) return;

  // أول رسالة — امسح الـ welcome
  if (chatEmpty) { chat.innerHTML = ''; chatEmpty = false; }

  // أضف رسالة المستخدم
  chat.innerHTML += `<div class="msg user">${q}</div>`;
  input.value    = '';
  btn.disabled   = true;
  btn.innerHTML  = '<span class="spinner"></span>';

  // أضف رسالة loading
  const loadId = 'load-' + Date.now();
  chat.innerHTML += `<div class="msg ai loading" id="${loadId}">جاري البحث في الكتاب...</div>`;
  chat.scrollTop  = chat.scrollHeight;

  try {
    const res  = await fetch('/api/book/ask', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ question: q })
    });
    const data = await res.json();

    const loadEl = document.getElementById(loadId);
    if (data.error) {
      loadEl.textContent = '⚠️ ' + data.error;
      return;
    }

    const pagesRef = data.pages && data.pages.length
      ? `<div class="pages-ref">📄 المصادر: ${data.pages.map(p => 'ص ' + p).join(' — ')}</div>`
      : '';

    loadEl.classList.remove('loading');
    loadEl.innerHTML = data.answer.replace(/\n/g, '<br>') + pagesRef;
  } catch(e) {
    document.getElementById(loadId).textContent = '⚠️ حدث خطأ، حاول مرة أخرى';
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'إرسال';
    chat.scrollTop = chat.scrollHeight;
  }
}
</script>
</body>
</html>

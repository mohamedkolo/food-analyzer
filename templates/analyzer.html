{% extends "base.html" %}
{% block content %}

<style>
  .anlz-wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; font-family: 'Cairo', 'Tajawal', system-ui, sans-serif; }
  .anlz-hero { text-align: center; padding: 20px 0 24px; }
  .anlz-hero h1 { font-size: 28px; font-weight: 800; color: #0f172a; margin: 0 0 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .anlz-hero p { color: #64748b; font-size: 15px; margin: 0; }

  .search-box {
    position: relative;
    background: #fff;
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    border: 2px solid #e2e8f0;
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%;
    border: 0;
    outline: 0;
    font-size: 17px;
    font-family: inherit;
    background: transparent;
    padding: 4px 0;
    color: #0f172a;
  }
  .search-input::placeholder { color: #94a3b8; }

  .cat-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 8px 4px 16px;
    scrollbar-width: thin;
  }
  .cat-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    background: #fff;
    border: 1.5px solid #e2e8f0;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: #475569;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-chip:hover { border-color: #10b981; }
  .cat-chip.active {
    background: #10b981;
    color: #fff;
    border-color: #10b981;
  }

  .results-count {
    text-align: center;
    color: #64748b;
    font-size: 13px;
    margin: 8px 0 16px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #94a3b8;
  }
  .empty-state .emoji { font-size: 60px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 18px; color: #475569; margin: 0 0 6px; font-weight: 700; }
  .empty-state p { margin: 0; font-size: 14px; }

  .food-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    border: 1px solid #f1f5f9;
    transition: all 0.2s;
  }
  .food-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border-color: #10b981;
  }

  .food-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .food-name { font-size: 19px; font-weight: 800; color: #0f172a; margin: 0; }
  .food-cal {
    background: linear-gradient(135deg, #10b981, #059669);
    color: #fff;
    padding: 8px 14px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 15px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .food-cal small { font-size: 10px; font-weight: 600; opacity: 0.9; }

  .macros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .macro-pill {
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .m-prot { background: #d1fae5; color: #065f46; }
  .m-carb { background: #fef3c7; color: #92400e; }
  .m-fat { background: #fee2e2; color: #991b1b; }

  .qty-section {
    background: #f8fafc;
    border-radius: 12px;
    padding: 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: center;
  }
  .qty-label { font-size: 13px; font-weight: 700; color: #475569; }
  .qty-input {
    width: 90px;
    padding: 8px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    text-align: center;
  }
  .qty-input:focus { outline: 0; border-color: #10b981; }

  .qty-result {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    text-align: center;
    font-size: 12px;
  }
  .qty-result > div { padding: 4px; }
  .qty-result strong { display: block; font-size: 15px; color: #0f172a; }
  .qty-result span { color: #64748b; font-size: 10px; }

  .food-note {
    margin-top: 12px;
    padding: 10px 14px;
    background: #fef3c7;
    border-right: 3px solid #f59e0b;
    border-radius: 8px;
    font-size: 13px;
    color: #78350f;
    line-height: 1.6;
  }
  .food-tip {
    margin-top: 8px;
    padding: 10px 14px;
    background: #dbeafe;
    border-right: 3px solid #3b82f6;
    border-radius: 8px;
    font-size: 13px;
    color: #1e40af;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .qty-section { grid-template-columns: 1fr; }
    .qty-result { grid-template-columns: repeat(2, 1fr); }
  }
</style>

<div class="anlz-wrap">

  <div class="anlz-hero">
    <h1>🔍 محلل الطعام</h1>
    <p>اكتب اسم الطعام لتشوف معلوماته الغذائية كاملة</p>
  </div>

  <div class="search-box">

  </div>

    <span class="cat-chip" data-cat="fish">🐟 أسماك</span>
    <span class="cat-chip" data-cat="dairy">🥛 ألبان وبيض</span>

  <div class="results-count" id="resultsCount" style="display:none;"></div>

</div>

function makeCard(food) {
  return `
    <div class="food-card">
      <div class="food-head">
        <h3 class="food-name">${food.n}</h3>
        <div class="food-cal">${food.cal} <small>kcal/100g</small></div>
      </div>
      <div class="macros">
        <span class="macro-pill m-prot">🥩 ${food.p}g بروتين</span>
        <span class="macro-pill m-carb">🍞 ${food.c}g كارب</span>
        <span class="macro-pill m-fat">🥑 ${food.f}g دهون</span>
      </div>
      <div class="qty-section">
        <div>
          <div class="qty-label">الكمية (جرام)</div>
          <input type="number" class="qty-input" value="100" min="1" max="1000" data-food='${JSON.stringify(food)}'>
        </div>
        <div class="qty-result">
          <div><strong class="r-cal">${food.cal}</strong><span>سعرة</span></div>
          <div><strong class="r-p">${food.p}</strong><span>بروتين g</span></div>
          <div><strong class="r-c">${food.c}</strong><span>كارب g</span></div>
          <div><strong class="r-f">${food.f}</strong><span>دهون g</span></div>
        </div>
      </div>
      ${food.note ? `<div class="food-note">ℹ️ ${food.note}</div>` : ''}
      ${food.tip ? `<div class="food-tip">${food.tip}</div>` : ''}
    </div>`;
}

function render() {

    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(f => f.n.toLowerCase().includes(q));
  }

  if (!currentSearch && !currentCat) {
    resultsContainer.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🔍</div>
        <h3>ابدأ بكتابة اسم الطعام</h3>
        <p>أو اختار فئة من فوق لتظهر الأطعمة</p>
      </div>`;
    resultsCount.style.display = 'none';
    return;
  }

  if (filtered.length === 0) {
    resultsContainer.innerHTML = `
      <div class="empty-state">
        <div class="emoji">😕</div>
        <h3>مفيش نتائج</h3>
        <p>جرّب بحث تاني أو فئة مختلفة</p>
      </div>`;
    resultsCount.style.display = 'none';
    return;
  }

  resultsCount.style.display = 'block';
  resultsCount.textContent = `${filtered.length} نتيجة — لكل 100 جرام`;
  resultsContainer.innerHTML = filtered.map(makeCard).join('');

  // Attach qty listeners
  document.querySelectorAll('.qty-input').forEach(inp => {
    inp.addEventListener('input', function() {
      const food = JSON.parse(this.dataset.food);
      const qty = parseFloat(this.value) || 0;
      const card = this.closest('.food-card');
      const ratio = qty / 100;
      card.querySelector('.r-cal').textContent = (food.cal * ratio).toFixed(0);
      card.querySelector('.r-p').textContent = (food.p * ratio).toFixed(1);
      card.querySelector('.r-c').textContent = (food.c * ratio).toFixed(1);
      card.querySelector('.r-f').textContent = (food.f * ratio).toFixed(1);
    });
  });
}

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  render();
});

catStrip.addEventListener('click', e => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  catStrip.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentCat = chip.dataset.cat;
  render();
});

render(); // Initial
</script>

{% endblock %}

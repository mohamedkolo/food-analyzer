{% extends "base.html" %}
{% block title %}{{ 'محلل الطعام' if (lang or 'ar')=='ar' else 'Food Analyzer' }}{% endblock %}

{% block extra_style %}
<style>
.food-card{background:#fff;border:1.5px solid var(--gray-2);border-radius:14px;padding:14px 16px;margin-bottom:10px;border-right:4px solid var(--blue-light);transition:all .2s}
.food-card:hover{box-shadow:0 3px 14px rgba(37,99,235,.1)}
.pill{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;display:inline-block}
.pill-p{background:#dcfce7;color:#166534}
.pill-c{background:#fef3c7;color:#92400e}
.pill-f{background:#fee2e2;color:#991b1b}
</style>
{% endblock %}

{% block content %}
{% set is_ar = (lang or 'ar') == 'ar' %}

<div class="page-title">
  <i class="fa-solid fa-magnifying-glass"></i>
  {{ 'محلل الطعام' if is_ar else 'Food Analyzer' }}
</div>

<div class="card">
  <div class="grid-2" style="gap:10px;margin-bottom:10px">
    <div class="form-group" style="margin:0">
      <label class="form-label">
        <i class="fa-solid fa-search"></i>
        {{ 'ابحث عن طعام' if is_ar else 'Search food' }}
      </label>
      <input class="form-input" type="text" id="searchInput" oninput="filterFoods()"
        placeholder="{{ 'دجاج، سلمون، شوفان...' if is_ar else 'chicken, salmon, oats...' }}">
    </div>
    <div class="form-group" style="margin:0">
      <label class="form-label">
        <i class="fa-solid fa-filter"></i>
        {{ 'الفئة' if is_ar else 'Category' }}
      </label>
      <select class="form-select" id="catSelect" onchange="filterFoods()">
        <option value="">{{ 'الكل' if is_ar else 'All' }}</option>
        <option value="poultry">{{ 'دواجن' if is_ar else 'Poultry' }}</option>
        <option value="meat">{{ 'لحوم حمراء' if is_ar else 'Red Meat' }}</option>
        <option value="fish">{{ 'أسماك' if is_ar else 'Fish' }}</option>
        <option value="eggs">{{ 'بيض' if is_ar else 'Eggs' }}</option>
        <option value="dairy">{{ 'ألبان' if is_ar else 'Dairy' }}</option>
        <option value="grains">{{ 'حبوب' if is_ar else 'Grains' }}</option>
        <option value="legumes">{{ 'بقوليات' if is_ar else 'Legumes' }}</option>
        <option value="nuts">{{ 'مكسرات' if is_ar else 'Nuts' }}</option>
        <option value="fruit">{{ 'فاكهة' if is_ar else 'Fruit' }}</option>
        <option value="veg">{{ 'خضروات' if is_ar else 'Vegetables' }}</option>
        <option value="egyptian">{{ 'مصري' if is_ar else 'Egyptian' }}</option>
      </select>
    </div>
  </div>
  <div id="resultCount" style="font-size:13px;color:var(--muted)"></div>
</div>

<div id="foodList"></div>

<script>
const IS_AR = {{ 'true' if is_ar else 'false' }};
const GR = IS_AR ? 'ج' : 'g';

const FOODS = [
  {k:'chicken_breast', ar:'صدر دجاج', en:'Chicken Breast', cal:165, p:31, c:0, f:3.6, cat:'poultry', note_ar:'مصدر ممتاز للبروتين الكامل قليل الدهون', note_en:'Excellent complete protein source, low fat', tip_ar:'افضل طريقه شوى او بخار', tip_en:'Best grilled or steamed'},
  {k:'chicken_thigh', ar:'فخذ دجاج', en:'Chicken Thigh', cal:209, p:26, c:0, f:10, cat:'poultry', note_ar:'اعلى في الدهون الصحية من الصدر', note_en:'Higher in healthy fats than breast', tip_ar:'مناسب للرياضيين', tip_en:'Great for athletes'},
  {k:'chicken_liver', ar:'كبدة دجاج', en:'Chicken Liver', cal:119, p:17, c:0.7, f:4.8, cat:'poultry', note_ar:'غنية بالحديد وفيتامين B12', note_en:'Rich in iron and vitamin B12', tip_ar:'مرة او مرتين اسبوعيا', tip_en:'Once or twice weekly'},

  {k:'lamb_leg', ar:'لحم ضان ساق', en:'Lamb Leg', cal:258, p:26, c:0, f:17, cat:'meat', note_ar:'غني بالزنك والحديد والكارنيتين', note_en:'Rich in zinc, iron, and carnitine', tip_ar:'مصدر ممتاز للكارنيتين', tip_en:'Excellent carnitine source'},
  {k:'beef_liver', ar:'كبدة بقري', en:'Beef Liver', cal:135, p:20, c:4, f:3.6, cat:'meat', note_ar:'اغنى مصدر طبيعي للحديد وB12', note_en:'Richest natural source of iron and B12', tip_ar:'وجبة واحدة اسبوعيا تكفي', tip_en:'One meal per week is enough'},

  {k:'greek_yogurt', ar:'زبادي يوناني', en:'Greek Yogurt', cal:59, p:10, c:3.6, f:0.4, cat:'dairy', note_ar:'بروبيوتيك وبروتين عالي', note_en:'Probiotic and high protein', tip_ar:'اختر غير محلى', tip_en:'Choose unsweetened'},
  {k:'cottage_cheese', ar:'جبن قريش', en:'Cottage Cheese', cal:98, p:11, c:3.4, f:4.3, cat:'dairy', note_ar:'بروتين بطيء الهضم ممتاز قبل النوم', note_en:'Slow-digesting protein, great before bed', tip_ar:'مع العسل او الخيار', tip_en:'With honey or cucumber'},
  {k:'milk_skim', ar:'حليب خالي الدسم', en:'Skim Milk', cal:35, p:3.4, c:5, f:0.1, cat:'dairy', note_ar:'نفس كالسيوم الحليب الكامل بسعرات اقل', note_en:'Same calcium as whole milk, fewer calories', tip_ar:'جيد بعد التمرين', tip_en:'Good after workout'},
  {k:'oats', ar:'شوفان', en:'Oats', cal:389, p:16.9, c:66, f:6.9, cat:'grains', note_ar:'بيتا جلوكان يخفض الكوليسترول', note_en:'Beta-glucan lowers cholesterol', tip_ar:'افضل افطار لبناء اليوم', tip_en:'Best breakfast to start the day'},
  {k:'rice_brown', ar:'ارز بني', en:'Brown Rice', cal:111, p:2.6, c:23, f:0.9, cat:'grains', note_ar:'اعلى الياف من الارز الابيض', note_en:'More fiber than white rice', tip_ar:'افضل للتحكم في سكر الدم', tip_en:'Better for blood sugar control'},
  {k:'rice_white', ar:'ارز ابيض', en:'White Rice', cal:130, p:2.7, c:28, f:0.3, cat:'grains', note_ar:'كارب سريع الهضم مصدر طاقة', note_en:'Fast-digesting carb, energy source', tip_ar:'افضل وقت بعد التمرين', tip_en:'Best timing after workout'},
  {k:'sweet_potato', ar:'بطاطا حلوة', en:'Sweet Potato', cal:86, p:1.6, c:20, f:0.1, cat:'grains', note_ar:'غني بالبيتا كاروتين والالياف', note_en:'Rich in beta-carotene and fiber', tip_ar:'الشوي في الفرن افضل', tip_en:'Baking is best'},
  {k:'lentils', ar:'عدس', en:'Lentils', cal:116, p:9, c:20, f:0.4, cat:'legumes', note_ar:'بروتين والياف وحديد في مكان واحد', note_en:'Protein, fiber and iron in one place', tip_ar:'كشري = بروتين كامل نباتي', tip_en:'With rice = complete plant protein'},
  {k:'fava_beans', ar:'فول مدمس', en:'Fava Beans', cal:110, p:7.6, c:20, f:0.5, cat:'legumes', note_ar:'الافطار الوطني المصري بروتين والياف', note_en:'Egyptian national breakfast, protein and fiber', tip_ar:'زيت زيتون وليمون يرفعان قيمته', tip_en:'Olive oil and lemon boost its value'},
  {k:'chickpeas', ar:'حمص', en:'Chickpeas', cal:164, p:8.9, c:27, f:2.6, cat:'legumes', note_ar:'ينظم سكر الدم والياف عالية', note_en:'Regulates blood sugar, high fiber', tip_ar:'انقعه الليل يسهل الهضم', tip_en:'Soak overnight for easier digestion'},
  {k:'almonds', ar:'لوز', en:'Almonds', cal:579, p:21, c:22, f:50, cat:'nuts', note_ar:'غني بالمغنيسيوم وفيتامين E', note_en:'Rich in magnesium and vitamin E', tip_ar:'28 جرام يوميا تكفي', tip_en:'28g daily is enough'},
  {k:'walnuts', ar:'جوز', en:'Walnuts', cal:654, p:15, c:14, f:65, cat:'nuts', note_ar:'المصدر النباتي الاغنى باوميغا 3', note_en:'Richest plant source of omega-3', tip_ar:'7 حبات يوميا', tip_en:'7 walnuts daily'},
  {k:'olive_oil', ar:'زيت زيتون', en:'Olive Oil', cal:884, p:0, c:0, f:100, cat:'nuts', note_ar:'73 بالمئة دهون احادية غير مشبعة', note_en:'73% monounsaturated fats', tip_ar:'بكر ممتاز للسلطات', tip_en:'Extra virgin for salads'},
  {k:'banana', ar:'موز', en:'Banana', cal:89, p:1.1, c:23, f:0.3, cat:'fruit', note_ar:'طاقة فورية طبيعية للرياضيين', note_en:'Natural quick energy for athletes', tip_ar:'قبل التمرين بـ 30 دقيقة', tip_en:'30 minutes before workout'},
  {k:'apple', ar:'تفاح', en:'Apple', cal:52, p:0.3, c:14, f:0.2, cat:'fruit', note_ar:'بيكتين يغذي بكتيريا الامعاء', note_en:'Pectin feeds gut bacteria', tip_ar:'بالقشر الالياف اكثر', tip_en:'With skin for more fiber'},
  {k:'dates', ar:'تمر', en:'Dates', cal:277, p:1.8, c:75, f:0.2, cat:'fruit', note_ar:'طاقة طبيعية فورية وحديد', note_en:'Natural quick energy and iron', tip_ar:'3 تمرات قبل التمرين', tip_en:'3 dates before workout'},
  {k:'pomegranate', ar:'رمان', en:'Pomegranate', cal:83, p:1.7, c:19, f:1.2, cat:'fruit', note_ar:'من اقوى مضادات الاكسدة', note_en:'One of the strongest antioxidants', tip_ar:'يحسن اداء التمرين', tip_en:'Improves exercise performance'},
  {k:'broccoli', ar:'بروكلي', en:'Broccoli', cal:34, p:2.8, c:7, f:0.4, cat:'veg', note_ar:'سوبر فود غني بالكالسيوم', note_en:'Superfood rich in calcium', tip_ar:'الطهي بالبخار يحافظ على قيمته', tip_en:'Steam to preserve nutrients'},
  {k:'spinach', ar:'سبانخ', en:'Spinach', cal:23, p:2.9, c:3.6, f:0.4, cat:'veg', note_ar:'حديد وكالسيوم وماغنيسيوم', note_en:'Iron, calcium, and magnesium', tip_ar:'ليمون يساعد امتصاص الحديد', tip_en:'Lemon helps iron absorption'},
  {k:'tomato', ar:'طماطم', en:'Tomato', cal:18, p:0.9, c:3.9, f:0.2, cat:'veg', note_ar:'لايكوبين مضاد اكسدة قوي', note_en:'Lycopene is a powerful antioxidant', tip_ar:'الطهي يرفع محتوى اللايكوبين', tip_en:'Cooking increases lycopene'},
  {k:'cucumber', ar:'خيار', en:'Cucumber', cal:16, p:0.6, c:4, f:0.1, cat:'veg', note_ar:'96 بالمئة ماء مرطب ممتاز', note_en:'96% water, excellent hydration', tip_ar:'وجبة خفيفة مثالية للتنشيف', tip_en:'Perfect light snack for cutting'},
  {k:'molokhia', ar:'ملوخية', en:'Molokhia', cal:44, p:4.8, c:8, f:0.6, cat:'egyptian', note_ar:'سوبر فود مصري حديد وكالسيوم', note_en:'Egyptian superfood, iron and calcium', tip_ar:'ثوم وليمون يرفعان امتصاص المعادن', tip_en:'Garlic and lemon boost mineral absorption'},
  {k:'hummus', ar:'حمص بطحينة', en:'Hummus', cal:166, p:7.9, c:14, f:9.6, cat:'egyptian', note_ar:'دهون صحية وبروتين والياف', note_en:'Healthy fats, protein and fiber', tip_ar:'مع الخبز الاسمر وجبة متكاملة', tip_en:'With whole wheat bread for complete meal'},
  {k:'falafel', ar:'فلافل', en:'Falafel', cal:333, p:13, c:32, f:18, cat:'egyptian', note_ar:'بروتين نباتي جيد لكن القلي يرفع الدهون', note_en:'Good plant protein but frying adds fat', tip_ar:'المخبوزة افضل بكثير', tip_en:'Baked is much better'},
];

function filterFoods() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catSelect').value;
  const filtered = FOODS.filter(f => {
    const name = IS_AR ? f.ar : f.en;
    const matchSearch = !search || name.toLowerCase().includes(search) || f.k.includes(search);
    const matchCat = !cat || f.cat === cat;
    return matchSearch && matchCat;
  });
  document.getElementById('resultCount').textContent = 
    filtered.length + (IS_AR ? ' نتيجة — لكل 100 جرام' : ' results — per 100g');
  renderFoods(filtered.slice(0, 30));
}

function renderFoods(list) {
  if (!list.length) {
    document.getElementById('foodList').innerHTML = '<div class="alert alert-warn"><i class="fa-solid fa-triangle-exclamation"></i> ' + (IS_AR ? 'لا نتائج' : 'No results') + '</div>';
    return;
  }
  document.getElementById('foodList').innerHTML = list.map(f => {
    const name = IS_AR ? f.ar : f.en;
    const note = IS_AR ? f.note_ar : f.note_en;
    const tip = IS_AR ? f.tip_ar : f.tip_en;
    return `
    <div class="food-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:15px;font-weight:800;color:var(--text)">${name}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--blue-light)">${f.cal}</div>
          <div style="font-size:11px;color:var(--muted)">kcal/100${GR}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <span class="pill pill-p"><i class="fa-solid fa-dumbbell"></i> ${f.p}${GR} ${IS_AR ? 'بروتين' : 'protein'}</span>
        <span class="pill pill-c"><i class="fa-solid fa-wheat-awn"></i> ${f.c}${GR} ${IS_AR ? 'كارب' : 'carbs'}</span>
        <span class="pill pill-f"><i class="fa-solid fa-droplet"></i> ${f.f}${GR} ${IS_AR ? 'دهون' : 'fat'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <label style="font-size:13px;font-weight:700">${IS_AR ? 'الكمية' : 'Amount'} (${GR}):</label>
        <input type="number" value="100" min="0" max="2000" step="10"
          style="width:80px;padding:6px;border:2px solid var(--gray-2);border-radius:8px;font-family:Cairo,sans-serif;text-align:center"
          oninput="calcGrams(this,${f.cal},${f.p},${f.c},${f.f},'${f.k}')" id="g_${f.k}">
      </div>
      <div id="res_${f.k}" style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:10px;padding:10px;display:none;margin-bottom:8px"></div>
      <details>
        <summary style="font-size:13px;font-weight:700;color:var(--blue);cursor:pointer">
          <i class="fa-solid fa-circle-info"></i> ${IS_AR ? 'معلومة + نصيحة' : 'Info + Tip'}
        </summary>
        <div style="margin-top:8px">
          <div style="background:var(--green-pale);border-right:3px solid var(--green-light);border-radius:8px;padding:8px 12px;font-size:13px;color:#14532d;margin-bottom:6px">${note}</div>
          <div style="background:#fffbeb;border-right:3px solid #f59e0b;border-radius:8px;padding:8px 12px;font-size:13px;color:#78350f">${tip}</div>
        </div>
      </details>
    </div>`;
  }).join('');
  list.forEach(f => {
    const inp = document.getElementById('g_' + f.k);
    if (inp) calcGrams(inp, f.cal, f.p, f.c, f.f, f.k);
  });
}

function calcGrams(inp, cal, p, c, f, k) {
  const g = parseFloat(inp.value) || 0;
  const res = document.getElementById('res_' + k);
  if (!res) return;
  if (g > 0) {
    const x = g / 100;
    res.style.display = 'block';
    res.innerHTML = `
      <div style="font-weight:700;color:var(--blue);margin-bottom:6px">${g}${GR} = </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--blue-light)">${(cal*x).toFixed(1)}</div><div style="font-size:11px;color:var(--muted)">kcal</div></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--green-light)">${(p*x).toFixed(1)}${GR}</div><div style="font-size:11px;color:var(--muted)">${IS_AR ? 'بروتين' : 'protein'}</div></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--orange)">${(c*x).toFixed(1)}${GR}</div><div style="font-size:11px;color:var(--muted)">${IS_AR ? 'كارب' : 'carbs'}</div></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--red)">${(f*x).toFixed(1)}${GR}</div><div style="font-size:11px;color:var(--muted)">${IS_AR ? 'دهون' : 'fat'}</div></div>
      </div>`;
  } else {
    res.style.display = 'none';
  }
}

filterFoods();
</script>
{% endblock %}
